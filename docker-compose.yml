services:
  db:
    image: postgres:15-alpine
    container_name: mentalbot_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME:-mentalbot}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mentalbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  web:
    build: .
    container_name: mentalbot_web
    restart: unless-stopped
    volumes:
      - static_volume:/app/Mental_Chatbot/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-mentalbot}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 Mental_Chatbot.wsgi:application
      "

volumes:
  postgres_data:
    name: mentalbot_postgres_data
  static_volume:
    name: mentalbot_static_files
